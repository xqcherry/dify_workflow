    - data:
        code: "import requests\n\ndef main(title: str, content: str, summary: str):\n\
          \    # 1. 配置信息\n    api_url = \"https://csexam.gxu.edu.cn/wiki/api.php\"\
          \n    bot_user = \"Root@DifyBot\"\n    bot_pass = \"06u8dcps6r8kb1s4frcniasddrs8bgdj\"\
          \n    \n    headers = {\n        \"User-Agent\": \"Mozilla/5.0 (Windows\
          \ NT 10.0; Win64; x64) AppleWebKit/537.36\",\n        \"Accept\": \"application/json\"\
          \n    }\n\n    # 使用 Session 保持登录状态和 Cookie 一致\n    session = requests.Session()\n\
          \n    try:\n        # 第一步：获取 Login Token\n        res1 = session.get(api_url,\
          \ params={\n            \"action\": \"query\",\n            \"meta\": \"\
          tokens\",\n            \"type\": \"login\",\n            \"format\": \"\
          json\"\n        }, headers=headers, timeout=10)\n        \n        login_token\
          \ = res1.json().get(\"query\", {}).get(\"tokens\", {}).get(\"logintoken\"\
          )\n        if not login_token:\n            return {\"result_msg\": \"获取\
          \ LoginToken 失败\", \"status\": \"Error\"}\n\n        # 第二步：正式登录\n      \
          \  login_data = {\n            \"action\": \"login\",\n            \"lgname\"\
          : bot_user,\n            \"lgpassword\": bot_pass,\n            \"lgtoken\"\
          : login_token,\n            \"format\": \"json\"\n        }\n        \n\
          \        res2 = session.post(api_url, data=login_data, headers=headers,\
          \ timeout=10)\n        if res2.json().get(\"login\", {}).get(\"result\"\
          ) != \"Success\":\n            return {\"result_msg\": \"登录 Wiki 失败\", \"\
          status\": \"Error\"}\n\n        # 第三步：获取编辑用的 CSRF Token\n        res3 =\
          \ session.get(api_url, params={\n            \"action\": \"query\",\n  \
          \          \"meta\": \"tokens\",\n            \"type\": \"csrf\",\n    \
          \        \"format\": \"json\"\n        }, headers=headers)\n        \n \
          \       csrf_token = res3.json().get(\"query\", {}).get(\"tokens\", {}).get(\"\
          csrftoken\", \"\")\n        if not csrf_token:\n            return {\"result_msg\"\
          : \"获取 CSRF Token 失败\", \"status\": \"Error\"}\n\n        # 第四步：执行写入 (使用你要求的变量名)\n\
          \        edit_data = {\n            \"action\": \"edit\",\n            \"\
          title\": title,\n            \"text\": content,\n            \"summary\"\
          : summary if summary else \"Sync via Dify Bot\",\n            \"token\"\
          : csrf_token,\n            \"format\": \"json\"\n        }\n        \n \
          \       res4 = session.post(api_url, data=edit_data, headers=headers, timeout=15)\n\
          \        edit_res = res4.json()\n\n        # 第五步：解析并返回结果\n        if edit_res.get(\"\
          edit\", {}).get(\"result\") == \"Success\":\n            return {\n    \
          \            \"result_msg\": f\"写入成功！页面：{title}\",\n                \"status\"\
          : \"Success\"\n            }\n        else:\n            error_info = edit_res.get(\"\
          error\", {}).get(\"info\", \"未知错误\")\n            return {\n           \
          \     \"result_msg\": f\"写入失败: {error_info}\",\n                \"status\"\
          : \"Fail\"\n            }\n\n    except Exception as e:\n        return\
          \ {\n            \"result_msg\": f\"运行异常: {str(e)}\",\n            \"status\"\
          : \"Exception\"\n        }"
        code_language: python3
